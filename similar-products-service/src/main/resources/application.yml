server:
  port: 5000

spring:
  application:
    name: similar-products-service
  webflux:
    thread-name-prefix: webflux-
  task:
    execution:
      pool:
        core-size: 100
        max-size: 200
        queue-capacity: 500
      thread-name-prefix: task-

logging:
  level:
    root: INFO
    com.ams.similarproducts: INFO

# External API configuration
external:
  products:
    base-url: http://localhost:3001/product
  config:
    max-timeout: 120 # seconds - high to allow cache warming to complete for slow products

# Cache warming configuration
cache:
  warming:
    interval-ms: 25000     # refresh every 25s (before 30s TTL expires)
    initial-delay-ms: 0    # start warming immediately on boot
