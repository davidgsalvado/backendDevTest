openapi: 3.0.0
info:
  title: Similar Products API
  description: API to fetch similar products based on a given product ID.
  version: 1.0.0
servers:
  - url: http://localhost:5000
paths:
  /products/{productId}/similar:
    get:
      summary: Get similar products
      description: Returns a list of similar products for the given product ID.
      parameters:
        - name: productId
          in: path
          required: true
          description: The ID of the product for which to find similar products.
          schema:
            type: string
      responses:
        '200':
          description: A list of similar products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    ProductResponse:
      type: object
      properties:
        id:
          type: string
          example: "1"
        name:
          type: string
          example: "Product Name"
        description:
          type: string
          example: "Product Description"
        price:
          type: number
          format: float
          example: 29.99
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "Product not found"